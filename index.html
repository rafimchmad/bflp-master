<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>General Banking — AI Knowledge Hub | BFLP BRI</title>
<meta name="description" content="Interactive Learning Directory & AI Knowledge Hub untuk materi General Banking Certification BFLP BRI">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- ===== Top bar ===== -->
<header class="topbar">
  <div class="brand">
    <span class="logo">GB</span>
    <span>General Banking Hub<small>AI Knowledge Hub · BFLP BRI</small></span>
  </div>
  <div class="searchwrap">
    <span class="si">⚲</span>
    <input id="globalSearch" type="text" placeholder="Cari materi, istilah, halaman… (CASA, NPL, KUR, Letter of Credit)" autocomplete="off">
    <span class="kbd">Ctrl K</span>
  </div>
  <div class="tb-actions">
    <button class="iconbtn" id="btnTheme" title="Ganti tema (T)">☾</button>
    <button class="iconbtn" id="btnChat" title="AI Assistant (C)">✦</button>
    <button class="iconbtn" id="btnSidebar" title="Sidebar (B)">☰</button>
  </div>
</header>

<div class="app">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="side-tabs">
      <button data-stab="dir" class="active">Direktori</button>
      <button data-stab="book">Bookmark</button>
      <button data-stab="recent">Terakhir</button>
      <button data-stab="fav">Favorit</button>
    </div>
    <div class="side-body" id="sideBody"></div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main" id="main">
    <div class="crumb" id="crumb"></div>
    <div id="viewRoot"></div>
  </main>

  <!-- ===== Chat ===== -->
  <aside class="chat" id="chat">
    <div class="chat-head"><span class="dot"></span> AI Tutor (RAG)
      <button class="btn sm" id="chatSettings" style="margin-left:auto">⚙</button>
      <button class="btn sm" id="chatClear">Bersihkan</button>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-suggest" id="chatSuggest"></div>
    <div class="chat-input">
      <textarea id="chatInput" placeholder="Tanya apa saja tentang General Banking…"></textarea>
      <button class="btn primary" id="chatSend">➤</button>
    </div>
  </aside>
</div>

<!-- Command palette -->
<div class="cmdk" id="cmdk"><div class="cmdk-box">
  <input id="cmdkInput" placeholder="Ketik perintah atau cari… (bab, kuis, flashcard, graph, dashboard)">
  <div class="cmdk-list" id="cmdkList"></div>
</div></div>

<div class="toast" id="toast"></div>

<!-- ===== Data (offline, load via file://) ===== -->
<script src="data/chapters-meta.js"></script>
<script src="data/chapters.js"></script>
<script src="data/glossary.js"></script>
<script src="data/synonyms.js"></script>
<script src="data/graph.js"></script>
<script src="data/flashcards.js"></script>
<script src="data/quiz.js"></script>
<script src="data/search-index.js"></script>
<!-- ===== App modules ===== -->
<script src="js/store.js"></script>
<script src="js/search.js"></script>
<script src="js/chat.js"></script>
<script src="js/graph.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
